tasks.register('generateSourceManifest') {
    inputs.property('androidSourceRepositoryUrl', androidSourceRepositoryUrl ?: '')
    inputs.property('androidSourceCommit', androidSourceCommit ?: '')
    inputs.property('upstreamSourceRepositoryUrl', upstreamSourceRepositoryUrl ?: '')
    inputs.property('upstreamSourceCommit', upstreamSourceCommit ?: '')
    inputs.property('xlsxioSourceRepositoryUrl', xlsxioSourceRepositoryUrl ?: '')
    inputs.property('xlsxioSourceCommit', xlsxioSourceCommit ?: '')
    outputs.file("${generatedComplianceAssetsDir}/SOURCE")

    doLast {
        def generatedAssetsDir = file(generatedComplianceAssetsDir)
        generatedAssetsDir.mkdirs()
        def sourceLines = []

        if (upstreamSourceRepositoryUrl && upstreamSourceCommit) {
            sourceLines << "upstream_url=${upstreamSourceRepositoryUrl}"
            sourceLines << "upstream_commit=${upstreamSourceCommit}"
        }

        sourceLines << "android_source_repository_url=${androidSourceRepositoryUrl}"
        sourceLines << "android_source_commit=${androidSourceCommit}"
        sourceLines << "xlsxio_url=${xlsxioSourceRepositoryUrl}"
        sourceLines << "xlsxio_commit=${xlsxioSourceCommit}"

        file("${generatedAssetsDir}/SOURCE").text = sourceLines.join('\n') + '\n'
    }
}

tasks.named('preBuild').configure {
    dependsOn tasks.named('copyGplLicense')
    dependsOn tasks.named('generateXlsxioLicense')
    dependsOn tasks.named('generateSourceManifest')
}
