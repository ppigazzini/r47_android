name: Linux CI

on:
  workflow_dispatch:
  push:
    branches:
      - github_ci
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_URL: https://gitlab.com/rpncalculators/c43.git
  XLSXIO_URL: https://github.com/brechtsanders/xlsxio.git
  XLSXIO_COMMIT: a9016eb2eb46dcd613a68fcfcd1002b5adf64ae9

jobs:
  resolve-upstream-core:
    name: Resolve authoritative upstream core revision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      upstream_url: ${{ steps.resolve.outputs.upstream_url }}
      upstream_commit: ${{ steps.resolve.outputs.upstream_commit }}
      upstream_short: ${{ steps.resolve.outputs.upstream_short }}
    steps:
      - name: Resolve authoritative upstream core
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit=$(git ls-remote --exit-code "$UPSTREAM_URL" refs/heads/master | awk 'NR == 1 { print $1 }')
          if [[ -z "$upstream_commit" ]]; then
            echo "Failed to resolve upstream master." >&2
            exit 1
          fi

          echo "upstream_url=$UPSTREAM_URL" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$upstream_commit" >> "$GITHUB_OUTPUT"
          echo "upstream_short=${upstream_commit:0:12}" >> "$GITHUB_OUTPUT"

  linux-simulator:
    name: Build Linux simulator package
    needs:
      - resolve-upstream-core
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
    steps:
      - name: Configure Git init defaults
        shell: bash
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git config --global advice.defaultBranchName false

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Detect runner build concurrency
        id: jobs
        shell: bash
        run: |
          set -euo pipefail

          jobs=$(nproc)
          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            libexpat1-dev \
            libgmp-dev \
            libgtk-3-dev \
            libminizip-dev \
            libpulse-dev \
            meson \
            ninja-build \
            pkg-config \
            unzip \
            xvfb \
            zip

      - name: Set pinned xlsxio revision
        id: xlsxio
        shell: bash
        run: |
          set -euo pipefail

          echo "xlsxio_url=$XLSXIO_URL" >> "$GITHUB_OUTPUT"
          echo "xlsxio_commit=$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"
          echo "xlsxio_prefix=$HOME/.cache/r47/xlsxio/$XLSXIO_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Restore xlsxio toolchain cache
        id: xlsxio-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
          key: ${{ runner.os }}-xlsxio-${{ steps.xlsxio.outputs.xlsxio_commit }}-static-tools-v1

      - name: Build upstream xlsxio toolchain
        if: steps.xlsxio-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          XLSXIO_URL: ${{ steps.xlsxio.outputs.xlsxio_url }}
          XLSXIO_COMMIT: ${{ steps.xlsxio.outputs.xlsxio_commit }}
          XLSXIO_PREFIX: ${{ steps.xlsxio.outputs.xlsxio_prefix }}
        run: |
          set -euo pipefail

          xlsxio_dir="${RUNNER_TEMP}/xlsxio"
          rm -rf "$xlsxio_dir"
          git init "$xlsxio_dir"
          git -C "$xlsxio_dir" remote add origin "$XLSXIO_URL"
          git -C "$xlsxio_dir" fetch --depth 1 origin "$XLSXIO_COMMIT"
          git -C "$xlsxio_dir" checkout --detach FETCH_HEAD

          mkdir -p "$XLSXIO_PREFIX"

          cmake -S "$xlsxio_dir" -B "$xlsxio_dir/build" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_STATIC=ON \
            -DBUILD_SHARED=OFF \
            -DBUILD_DOCUMENTATION=FALSE \
            -DBUILD_EXAMPLES=FALSE \
            -DBUILD_TOOLS=ON \
            -DWITH_LIBZIP=OFF

          cmake --build "$xlsxio_dir/build" --parallel "${{ steps.jobs.outputs.jobs }}"
          cmake --install "$xlsxio_dir/build" --prefix "$XLSXIO_PREFIX"

      - name: Expose xlsxio toolchain
        shell: bash
        run: |
          set -euo pipefail

          echo "${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin" >> "$GITHUB_PATH"
          export PATH="${{ steps.xlsxio.outputs.xlsxio_prefix }}/bin:$PATH"
          xlsxio_xlsx2csv -h > /dev/null

      - name: Sync authoritative upstream core
        id: upstream
        shell: bash
        env:
          UPSTREAM_URL: ${{ needs.resolve-upstream-core.outputs.upstream_url }}
          UPSTREAM_COMMIT: ${{ needs.resolve-upstream-core.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          upstream_url="$UPSTREAM_URL"
          upstream_commit="$UPSTREAM_COMMIT"

          if [[ -z "$upstream_commit" ]]; then
            echo "Missing resolved upstream commit." >&2
            exit 1
          fi

          if git remote | grep -qx upstream; then
            git remote set-url upstream "$upstream_url"
          else
            git remote add upstream "$upstream_url"
          fi

          git fetch --depth 1 upstream "$upstream_commit"
          git cat-file -e "$upstream_commit^{commit}"
          echo "upstream_url=$upstream_url" >> "$GITHUB_OUTPUT"
          echo "upstream_commit=$upstream_commit" >> "$GITHUB_OUTPUT"

          git archive --format=tar "$upstream_commit" | tar -xf -

          git checkout -- \
            .gitignore \
            README.md \
            Makefile \
            build_android.sh \
            sync_public.sh \
            dist.sh \
            meson.build \
            meson_options.txt \
            android/ \
            .github/

          while IFS= read -r meson_file; do
            git checkout -- "$meson_file"
          done < <(git ls-files | grep -E '(^|/)meson\.build$' | grep -Ev '^src/')

      - name: Set artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          upstream_commit="${{ steps.upstream.outputs.upstream_commit }}"
          if [[ -z "$upstream_commit" ]]; then
            echo "Missing synchronized upstream commit metadata." >&2
            exit 1
          fi

          upstream_short_commit="${upstream_commit:0:12}"
          artifact_name="r47-linux-${upstream_short_commit}"

          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Build Linux simulator package
        shell: bash
        env:
          R47_SOURCE_REPOSITORY_URL: ${{ steps.upstream.outputs.upstream_url }}
          R47_SOURCE_COMMIT: ${{ steps.upstream.outputs.upstream_commit }}
        run: |
          set -euo pipefail

          mkdir -p ci-artifacts/logs
          make -j "${{ steps.jobs.outputs.jobs }}" \
            NINJAFLAGS="-j ${{ steps.jobs.outputs.jobs }}" \
            XVFB=xvfb-run \
            dist_linux 2>&1 | tee ci-artifacts/logs/build-linux.log

      - name: Upload Linux build log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}-build-log
          path: ci-artifacts/logs/build-linux.log
          if-no-files-found: warn
          retention-days: 14

      - name: Collect Linux package artifact
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="$PWD/ci-artifacts"
          release_dir="$artifact_dir/release"
          package_zip="c47-linux.zip"
          package_dir="$release_dir/c47-linux"
          stripped_count=0

          rm -rf "$release_dir"
          mkdir -p "$release_dir"

          if [[ ! -f "$package_zip" ]]; then
            echo "Missing Linux package zip: $package_zip" >&2
            exit 1
          fi

          unzip -q "$package_zip" -d "$release_dir"

          if [[ ! -d "$package_dir" ]]; then
            echo "Missing extracted Linux package directory: $package_dir" >&2
            exit 1
          fi

          if command -v llvm-strip > /dev/null 2>&1; then
            strip_tool=llvm-strip
          elif command -v strip > /dev/null 2>&1; then
            strip_tool=strip
          else
            echo "No strip tool found in PATH." >&2
            exit 1
          fi

          while IFS= read -r -d '' binary; do
            if ! readelf -h "$binary" > /dev/null 2>&1; then
              continue
            fi

            "$strip_tool" "$binary"
            stripped_count=$((stripped_count + 1))
          done < <(find "$package_dir" -type f -print0)

          cp COPYING "$package_dir/COPYING"

          cat > "$package_dir/LICENSE.txt" <<'EOF'
          Copyright (C) 2016 Brecht Sanders All Rights Reserved

          Permission is hereby granted, free of charge, to any person obtaining
          a copy of this software and associated documentation files (the
          "Software"), to deal in the Software without restriction, including
          without limitation the rights to use, copy, modify, merge, publish,
          distribute, sublicense, and/or sell copies of the Software, and to
          permit persons to whom the Software is furnished to do so, subject to
          the following conditions:

          The above copyright notice and this permission notice shall be
          included in all copies or substantial portions of the Software.

          THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND,
          EXPRESS OR IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF
          MERCHANTABILITY, FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT.
          IN NO EVENT SHALL THE AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY
          CLAIM, DAMAGES OR OTHER LIABILITY, WHETHER IN AN ACTION OF CONTRACT,
          TORT OR OTHERWISE, ARISING FROM, OUT OF OR IN CONNECTION WITH THE
          SOFTWARE OR THE USE OR OTHER DEALINGS IN THE SOFTWARE.
          EOF

          cat > "$package_dir/SOURCE" <<EOF
          upstream_url=${{ steps.upstream.outputs.upstream_url }}
          upstream_commit=${{ steps.upstream.outputs.upstream_commit }}
          upstream_license_file=COPYING
          xlsxio_url=${{ steps.xlsxio.outputs.xlsxio_url }}
          xlsxio_commit=${{ steps.xlsxio.outputs.xlsxio_commit }}
          xlsxio_license_file=LICENSE.txt
          EOF

          find "$package_dir" -type f | sed "s#^$release_dir/##" | sort > "$release_dir/PACKAGE-CONTENTS.txt"

          cat > "$release_dir/BUILD-METADATA.txt" <<EOF
          upstream_url=${{ steps.upstream.outputs.upstream_url }}
          upstream_commit=${{ steps.upstream.outputs.upstream_commit }}
          upstream_license_file=COPYING
          source_manifest_file=SOURCE
          xlsxio_url=${{ steps.xlsxio.outputs.xlsxio_url }}
          xlsxio_commit=${{ steps.xlsxio.outputs.xlsxio_commit }}
          xlsxio_license_file=LICENSE.txt
          make_target=dist_linux
          strip_tool=$strip_tool
          stripped_files_count=$stripped_count
          package_zip=$package_zip
          package_dir=$(basename "$package_dir")
          EOF

      - name: Upload Linux simulator artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ci-artifacts/release/
          if-no-files-found: error
          retention-days: 14